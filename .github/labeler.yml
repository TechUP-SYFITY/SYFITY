feat:
  - changed-files:
      - any-glob-to-any-file:
          - apps/frontend/src/features/**
          - apps/backend/src/**

chore:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - pnpm-workspace.yaml
          - .husky/**
          - commitlint.config.mjs
          - .github/workflows/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
