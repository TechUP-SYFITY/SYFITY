name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  lint-be:
    name: Backend — Lint / Type-check / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Generate tsoa routes
        run: pnpm --filter backend generate

      - name: Lint
        run: pnpm --filter backend lint

      - name: Type-check
        run: pnpm --filter backend exec tsc --noEmit

      - name: Test
        run: pnpm --filter backend test

  lint-fe:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter frontend lint

  build-fe:
    name: Frontend — Build (includes type-check)
    runs-on: ubuntu-latest
    needs: lint-fe
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm --filter frontend build
